<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles/sign-in-up.css">
    <title>Document</title>
</head>
<body>
    <div id="alert">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    <div id="sign-in_up-cont">
        <h1 id="title">Welcome to Flask Banking</h1>
        <form action="/log_in" method="POST" id="form">
            <input type="text" name="email" placeholder="Email" class="input_field">
            <input type="text" name="username" placeholder="Username" class="input_field">
            <input type="text" name="password" placeholder="Password (Hover over)" title="Must by 8 characters in length and contain at least 1 capital letter and a special symbol, such as $, %, &." class="input_field">
            <a href="/" id="sign-in-up">Don't have an account? Register here!</a>
            <input type="submit" name="submit" value="Register" id="submit-btn">
        </form>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
