<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/styles/sign-in-up.css">
    <title>Document</title>
</head>
<body>
    <div id="log-in-cont">
        <h1 id="title">Welcome to Flask Banking</h1>
        <form action="/" method="POST" id="form">
            <title>Username</title>
            <input type="text" name="username" placeholder="Username" class="input_field">
            <input type="text" name="password" placeholder="Password (Hover over)" title="Must by 8 characters in length and contain at least 1 capital letter and a special symbol, such as $, %, &." class="input_field">
            <input type="text" name="f_name" placeholder="First name" class="input_field">
            <input type="text" name="l_name" placeholder="Last Name" class="input_field">
            <input type="text" name="ssn" id="ssn" class="input_field" placeholder="XXX-XX-XXXX (SSN)" pattern="\d{3}-\d{2}-\d{4}">
            <input type="text" name="address" placeholder="Address" class="input_field">
            <input type="tel" name="phones" id="phone" class="input_field" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890" required>
            <a href="/log_in" id="sign-in-up">Already have an account? Log in here!</a>
            <input type="submit" name="submit" value="Register" id="submit-btn">
        </form>
    </div>

<script>
    const input = document.getElementById('phone')
        input.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/)
        e.target.value = !x[2] ? x[1] : `(${x[1]}) ${x[2]}${x[3] ? '-' + x[3] : ''}`
    })

    document.getElementById('ssn').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '')
        if (value.length > 9) value = value.slice(0, 9)
        let formatted = value.replace(/^(\d{3})(\d{0,2})(\d{0,4})/, (match, p1, p2, p3) => {
            let res = p1
            if (p2) res += '-' + p2
            if (p3) res += '-' + p3
            return res
        })
        e.target.value = formatted
    })
</script>
</body>
</html>
